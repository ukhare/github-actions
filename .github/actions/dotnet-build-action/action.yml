name: "Building .NET Project"
description: "Restores, builds, and optionally uploads a .NET project with Port status reporting."

inputs:
  project-name:
    description: "Name of the .NET project."
    required: true

  app-dir:
    description: "Path to the .csproj file."
    required: true

  app:
    description: "Name of the .NET application, must match the name of the .csproj file."
    required: true

  sln-path:
    description: "Path to the solution file."
    required: false

  build-configuration:
    description: "Build configuration (Release/Debug)."
    required: false
    default: "Release"

  upload_build:
    description: "Set to true to upload build artifacts."
    required: false
    default: "false"

  port-client-id:
    description: "Port Client ID"
    required: false

  port-client-secret:
    description: "Port Client Secret"
    required: false

  port-run-id:
    description: "Port Run ID"
    required: false

runs:
  using: "composite"

  steps:
    - name: Report validation started
      if: inputs.port-run-id != ''
      uses: port-labs/port-github-action@v1
      with:
        clientId: ${{ inputs.port-client-id }}
        clientSecret: ${{ inputs.port-client-secret }}
        baseUrl: https://api.getport.io
        operation: PATCH_RUN
        runId: ${{ inputs.port-run-id }}
        logMessage: |
          🔍 Validating project: ${{ inputs.project-name }}
          📁 Project path: ${{ inputs.app-dir }}

    - name: Validate project path
      id: validate
      shell: bash
      run: |
        if [ ! -f "${{ inputs.app-dir }}" ]; then
          echo "::error title=Missing Project File::The project file '${{ inputs.app-dir }}' does not exist."
          exit 1
        fi
        echo "✅ Project file validated successfully"

    - name: Report restore started
      if: inputs.port-run-id != ''
      uses: port-labs/port-github-action@v1
      with:
        clientId: ${{ inputs.port-client-id }}
        clientSecret: ${{ inputs.port-client-secret }}
        baseUrl: https://api.getport.io
        operation: PATCH_RUN
        runId: ${{ inputs.port-run-id }}
        logMessage: |
          📦 Restoring NuGet packages for ${{ inputs.project-name }}

    - name: Restore NuGet packages
      id: restore
      shell: bash
      run: |
        if ! dotnet restore "${{ inputs.app-dir }}"; then
          echo "::error title=Restore Failed::NuGet restore failed."
          exit 1
        fi
        echo "✅ NuGet packages restored"

    - name: Report build started
      if: inputs.port-run-id != ''
      uses: port-labs/port-github-action@v1
      with:
        clientId: ${{ inputs.port-client-id }}
        clientSecret: ${{ inputs.port-client-secret }}
        baseUrl: https://api.getport.io
        operation: PATCH_RUN
        runId: ${{ inputs.port-run-id }}
        logMessage: |
          🔨 Building ${{ inputs.project-name }}
          ⚙️ Configuration: ${{ inputs.build-configuration }}

    - name: Build project
      id: build
      shell: bash
      run: |
        output_dir="./dotnet_build_output-${{ inputs.project-name }}"
        log_file="${{ inputs.project-name }}/build.log"

        mkdir -p "${{ inputs.project-name }}"

        dotnet build "${{ inputs.app-dir }}" \
          --configuration "${{ inputs.build-configuration }}" \
          --no-restore \
          -o "$output_dir" \
          --verbosity normal \
          | tee "$log_file"

        echo "Build finished"

    - name: Analyze warnings and errors
      id: annotate
      shell: bash
      run: |
        log_file="${{ inputs.project-name }}/build.log"

        warning_count=$(grep -c ": warning " "$log_file" 2>/dev/null || true)
        error_count=$(grep -c ": error " "$log_file" 2>/dev/null || true)

        warning_count=${warning_count:-0}
        error_count=${error_count:-0}

        echo "warning_count=$warning_count" >> "$GITHUB_OUTPUT"
        echo "error_count=$error_count" >> "$GITHUB_OUTPUT"

        grep ": warning " "$log_file" | while read line; do
          echo "::warning::$line"
        done || true

        grep ": error " "$log_file" | while read line; do
          echo "::error::$line"
        done || true

    - name: Upload build artifacts
      id: upload
      if: inputs.upload_build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ inputs.project-name }}
        path: ./dotnet_build_output-${{ inputs.project-name }}
        if-no-files-found: ignore

    - name: Report success
      if: success() && inputs.port-run-id != ''
      uses: port-labs/port-github-action@v1
      with:
        clientId: ${{ inputs.port-client-id }}
        clientSecret: ${{ inputs.port-client-secret }}
        baseUrl: https://api.getport.io
        operation: PATCH_RUN
        runId: ${{ inputs.port-run-id }}
        logMessage: |
          ✅ Build completed for ${{ inputs.project-name }}
          ⚠️ Warnings: ${{ steps.annotate.outputs.warning_count }}
          ❌ Errors: ${{ steps.annotate.outputs.error_count }}
          📦 Artifacts uploaded: ${{ inputs.upload_build }}
